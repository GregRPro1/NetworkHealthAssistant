name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build PDF guide
        run: python tools/build_userguide.py

      - name: Prepare dist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          git archive --format=zip --output dist/NetworkHealthAssistant-${{ github.ref_name }}.zip HEAD

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/NetworkHealthAssistant-${{ github.ref_name }}.zip
            docs/UserGuide.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
